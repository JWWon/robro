    test_type: manual
    test_plan: |
      1. Run: head -3 skills/plan/SKILL.md
      2. Verify output shows "name: plan"
      3. Run: ls skills/plan/
      4. Expected: SKILL.md, plan-reviewer-prompt.md, spec-reviewer-prompt.md
      5. Run: test ! -d skills/spec && echo PASS
      6. Expected: PASS
    passes: true

