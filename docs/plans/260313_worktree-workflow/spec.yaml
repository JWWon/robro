meta:
  id: "260313_worktree-workflow"
  idea: idea.md
  plan: plan.md
  created: "2026-03-13T00:00:00Z"
  updated: "2026-03-13T00:00:00Z"
  ambiguity_score: 0.12
  complexity: complex

goal: "Refactor the robro pipeline to use git worktrees for branch isolation, rename skills for clarity (spec→plan, build→do), add complexity-driven agent model selection, and clean up YAML schemas — producing exactly one squash-merge commit per plan cycle on main."

constraints:
  - "Agent tool only exposes model parameter (haiku/sonnet/opus) — no thinking level control"
  - "Three CLAUDE.md files must stay in sync (root, .claude/, setup template)"
  - "Hook scripts parse status.yaml with grep+sed — schema must remain flat YAML"
  - ".claude/worktrees/ must be gitignored"
  - "EnterWorktree creates new worktrees only — cannot re-enter existing ones cross-session"
  - "Researcher and retro-analyst capped at sonnet (never opus)"
  - "Clean break — no backward compatibility migration for old plans"

non_goals:
  - "Automatic version tagging after merge"
  - "Aliases for old skill names (/robro:spec, /robro:build)"
  - "Changes to the 6-phase structure (Brief → Heads-down → Review → Retro → Level-up → Converge)"
  - "Migration tooling for existing plans"

context:
  type: "brownfield"
  tech_stack:
    - "Shell (bash) — hook scripts"
    - "Markdown — skill and agent definitions"
    - "YAML — status.yaml, spec.yaml, model-config.yaml"
    - "JSON — hooks.json, plugin.json"
  existing_patterns:
    - "Agent-level worktrees for parallel builder isolation (Path B in heads-down phase)"
    - "Status.yaml drives all hook injection via grep+sed parsing"
    - "Skills own interaction (AskUserQuestion); agents are workers"
    - "Flat YAML schema — no nested structures"
  key_files:
    - "skills/spec/SKILL.md (becomes skills/plan/SKILL.md)"
    - "skills/build/SKILL.md (becomes skills/do/SKILL.md)"
    - "skills/build/converge-phase.md (becomes skills/do/converge-phase.md)"
    - "hooks/hooks.json"
    - "scripts/*.sh (all 8 hook scripts)"
    - ".claude-plugin/plugin.json"
    - "CLAUDE.md, .claude/CLAUDE.md, README.md"

architecture_decisions:
  - decision: "Merge approval in converge phase, not hook"
    rationale: "Stop hooks can only return block/allow JSON. No PostStop event exists. Only skills can use AskUserQuestion."
    alternatives: ["Post-stop hook (impossible)", "Separate /robro:merge skill"]
  - decision: "EnterWorktree + git branch -m for worktree creation"
    rationale: "EnterWorktree properly resets CWD-dependent caches. Branch rename gives desired plan/{slug} naming."
    alternatives: ["git worktree add via Bash only", "Manual cd (incomplete cache reset)"]
  - decision: "model-config.yaml at plugin root"
    rationale: "Separates model selection from skill logic. Both shell scripts and skills can read it."
    alternatives: ["Embed in plugin.json", "Per-agent frontmatter defaults", "Hardcoded in SKILL.md"]
  - decision: "Single atomic commit for rename"
    rationale: "27 files, ~100 references. Partial rename breaks hooks."
    alternatives: ["Incremental rename by category"]
  - decision: "Thinking level deferred (platform limitation)"
    rationale: "Claude Code Agent tool only has model parameter. No thinking level/budget exists."
    alternatives: ["Attempt undocumented parameters", "Wait for platform update"]
  - decision: "Clean-memory replaced by converge-phase cleanup"
    rationale: "Worktree lifecycle handles cleanup. Cross-plan analysis was low-value for pre-1.0."
    alternatives: ["Keep alongside worktree", "Refactor to work with worktrees"]
  - decision: "session-start.sh worktree scan for cross-session resume"
    rationale: "Only session-start.sh needs worktree awareness. All other hooks work naturally via CWD when inside a worktree."
    alternatives: ["Status.yaml pointer pattern (requires modifying all 8 hooks)", "Breadcrumb file in main repo"]

sections:
  - id: S1
    name: "Skill Renaming"
    description: "Rename spec→plan, build→do across all files"
    requirements:
      - "Pipeline becomes /robro:idea → /robro:plan → /robro:do"
      - "All internal references updated consistently"
  - id: S2
    name: "Worktree Lifecycle"
    description: "Plan-scoped worktree creation, file migration, cross-session resume"
    requirements:
      - "Worktree created at /robro:plan start via EnterWorktree"
      - "Plan files copied from main to worktree"
      - "Main working directory cleaned after migration"
  - id: S3
    name: "Complexity Tiers"
    description: "3-tier complexity classification (light/standard/complex)"
    requirements:
      - "PM proposes in idea.md, plan confirms in spec.yaml"
      - "Drives agent model selection during do"
  - id: S4
    name: "Model Configuration"
    description: "Plugin-level model mapping per complexity tier"
    requirements:
      - "model-config.yaml at plugin root with 3 tiers"
      - "Each tier maps agent roles to models (haiku/sonnet/opus)"
      - "Researcher and retro-analyst capped at sonnet"
  - id: S5
    name: "Spec.yaml Complexity"
    description: "spec.yaml gains complexity field in meta section"
    requirements:
      - "complexity field set by plan skill"
      - "Read by do skill for model dispatch"
  - id: S6
    name: "Status.yaml Schema"
    description: "Typed fields, integer steps, numeric ambiguity"
    requirements:
      - "No more quoted string steps or floating-point step numbers"
      - "New fields: ambiguity, complexity, branch, worktree"
      - "Remains flat YAML parseable by grep+sed"
  - id: S7
    name: "Cross-session Resume"
    description: "Detect active worktree plans from main repo"
    requirements:
      - "session-start.sh scans .claude/worktrees/*/docs/plans/*/ as fallback"
      - "Guides user to enter worktree for resume"
  - id: S8
    name: "Clean-memory Removal"
    description: "Remove clean-memory skill, replaced by converge cleanup"
    requirements:
      - "skills/clean-memory/ deleted"
      - "All references to clean-memory removed"
  - id: S9
    name: "Squash Merge"
    description: "One squash-merge commit per plan cycle on main"
    requirements:
      - "git merge --squash plan/{slug} produces single commit"
      - "Worktree and branch cleaned up after merge"
  - id: S10
    name: "Converge Merge Approval"
    description: "User approval before squash merge via AskUserQuestion"
    requirements:
      - "Merge/Keep/Discard options presented"
      - "Conflict handling: present to user, no auto-resolve"
  - id: S11
    name: "Plugin Version"
    description: "Version bump to 0.1.1 with manual tagging instructions"
    requirements:
      - "plugin.json version = 0.1.1"
      - "CLAUDE.md has versioning note"
  - id: S12
    name: "Thinking Level"
    description: "Document platform limitation, defer implementation"
    requirements:
      - "Known Limitations section in CLAUDE.md"
  - id: S13
    name: "Documentation"
    description: "All docs reflect new workflow, naming, and features"
    requirements:
      - "Root CLAUDE.md, .claude/CLAUDE.md, README.md all updated"
      - "Worktree workflow documented"
      - "Model config documented"

