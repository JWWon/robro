meta:
  id: "260313_build-refinements"
  idea: idea.md
  plan: plan.md
  created: "2026-03-13T00:00:00Z"
  updated: "2026-03-13T00:00:00Z"
  ambiguity_score: 0.11

goal: "Refine the build skill's execution model to use inline builders for small/same-category tasks, Claude Code Teams for large/multi-topic parallel work, squash merge for clean history, and auto-cleanup for worktree hygiene."

constraints:
  - "isolation: worktree in agent frontmatter forces worktree on every dispatch — use the Agent tool dispatch-time isolation parameter for dynamic per-dispatch choice instead"
  - "Claude Code Teams require CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 in settings.json env block"
  - "Teams have limitations: no session resume, task status lag, slow shutdown, one team per session, no nested teams"
  - "Team teammates lack the Agent tool — cannot spawn worktree-isolated subagents"
  - "Teams use non-overlapping file assignments for conflict avoidance"
  - "Squash merge requires git branch -D (force delete) instead of git branch -d"
  - ".claude/settings.json may not exist yet in target projects"

non_goals:
  - "Backward-compatible worktree builder fallback"
  - "Manual cleanup commands or on-demand cleanup skill"
  - "File-overlap heuristic for inline-vs-Teams decision"
  - "Hard cap on inline subagent count"
  - "CLAUDE_CODE_ADDITIONAL_DIRECTORIES_CLAUDE_MD env var (undocumented)"

context:
  type: "brownfield"
  tech_stack:
    - "Claude Code plugin system (markdown agents, skills, shell hooks)"
    - "Agent tool with dispatch-time isolation parameter"
    - "Claude Code Teams API (TeamCreate, TaskCreate, SendMessage)"
    - "Git worktrees for agent isolation"
  existing_patterns:
    - "Builder agent with isolation: worktree frontmatter (to be removed)"
    - "Heads-down phase with worktree-per-builder model (to be rewritten)"
    - "Brief phase with file-overlap detection D9 (to be extended with path classification)"
    - "Setup skill with CLAUDE.md management, MCP detection, .gitignore (to add settings.json)"
  key_files:
    - "agents/builder.md"
    - "agents/conflict-resolver.md"
    - "skills/build/heads-down-phase.md"
    - "skills/build/brief-phase.md"
    - "skills/build/SKILL.md"
    - "skills/setup/SKILL.md"
    - "scripts/pipeline-guard.sh"
    - "CLAUDE.md"
    - ".claude/CLAUDE.md"

architecture_decisions:
  - decision: "Remove isolation: worktree from builder.md frontmatter"
    rationale: "Agent tool dispatch-time isolation parameter enables per-dispatch choice"
    alternatives: ["Keep frontmatter + create second builder-inline.md"]
  - decision: "3-path execution model (inline, isolated, Teams)"
    rationale: "Matches task characteristics: inline for speed, isolated for safety, Teams for coordination"
    alternatives: ["Agent-only (no Teams)", "Teams-first (no isolation)"]
  - decision: "Teams use non-overlapping file sets, not worktrees"
    rationale: "Teammates lack the Agent tool — cannot spawn worktree-isolated subagents"
    alternatives: ["Force EnterWorktree in teammate prompts"]
  - decision: "Brief phase classifies execution path per level"
    rationale: "Brief already has file-overlap detection — natural place for path routing"
    alternatives: ["Heads-down decides dynamically"]
  - decision: "Squash merge only for isolated path"
    rationale: "Only isolated dispatches create worktree branches; inline and Teams write directly"
    alternatives: ["Squash merge for all paths"]
  - decision: "Drop CLAUDE_CODE_ADDITIONAL_DIRECTORIES_CLAUDE_MD"
    rationale: "Not found in any official docs — undocumented env var"
    alternatives: ["Add it anyway and verify later"]

sections:
  - id: S1
    name: "Execution Model"
    description: "Builder agent dual-mode support and 3-path execution in heads-down phase"
    requirements:
      - "Builder agent works inline by default (no forced worktree)"
      - "Inline builders can run in parallel for same-category small tasks"
      - "Worktree-isolated builders dispatched via Agent tool isolation parameter"
      - "Teams handle multi-topic coordination with non-overlapping file sets"
      - "Brief phase classifies levels into execution paths"

  - id: S2
    name: "Merge & Cleanup"
    description: "Squash merge for isolated path, auto-cleanup of worktrees and branches"
    requirements:
      - "Squash merge replaces --no-ff for worktree branch merges"
      - "Auto-cleanup (worktree remove + branch force-delete) immediately after merge"
      - "Stale worktree cleanup in Brief phase"

  - id: S3
    name: "Agent Updates"
    description: "Builder and conflict-resolver agent descriptions updated for new model"
    requirements:
      - "Conflict-resolver reflects squash merge model"

  - id: S4
    name: "Setup Skill Enhancement"
    description: "Settings.json management for experimental feature flags"
    requirements:
      - "Setup skill creates/updates .claude/settings.json with Teams env var"

  - id: S5
    name: "Documentation Consistency"
    description: "All documentation references updated for new execution model"
    requirements:
      - "CLAUDE.md and .claude/CLAUDE.md reflect new agent descriptions"
      - "Pipeline-guard hook injects correct heads-down guidance"

