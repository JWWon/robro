meta:
  id: "260313_level-up-enhancements"
  idea: idea.md
  plan: plan.md
  created: "2026-03-13T13:00:00Z"
  updated: "2026-03-13T13:00:00Z"
  ambiguity_score: 0.09

goal: "Make the build cycle's level-up phase produce actionable, evidence-based project configuration suggestions by enhancing the retro-analyst's comparison capabilities, and provide a standalone `/robro:tune` skill for manual configuration audits — both sharing a single analysis framework."

constraints:
  - "No new build phases — enhance existing brief and retro phases only"
  - "No PostToolUse-level hook tracking"
  - "No cross-sprint trending in retro (clean-memory's job)"
  - "No structural changes to level-up phase — extending Step e to support REMOVE alongside CREATE/UPDATE is permitted"
  - "No changes to /robro:setup skill"
  - "Structural verification only — no automated test framework"
  - "Cap retro config suggestions at 5 per sprint"
  - "Suggestions scoped to project .claude/ only, never plugin root"

non_goals:
  - "New build phases"
  - "PostToolUse tracking hooks"
  - "Cross-sprint trending in retro"
  - "Level-up phase restructuring (adding/removing/reordering steps)"
  - "Setup skill changes"
  - "Clean-memory rename"

context:
  type: "brownfield"
  tech_stack:
    - "Claude Code plugin (markdown + shell scripts)"
    - "YAML frontmatter for skills and agents"
    - "Bash hooks with jq for JSON parsing"
  existing_patterns:
    - "Skills own interaction, agents are workers"
    - "Status.yaml drives hooks"
    - "Retro-analyst receives PROJECT_SETUP and proposes level-ups"
    - "Level-up processes proposals through 5-step flow"
    - "Brief scans .claude/ in step 3"
  key_files:
    - "skills/build/brief-phase.md"
    - "agents/retro-analyst.md"
    - "skills/build/retro-phase.md"
    - "skills/build/level-up-phase.md"
    - "skills/build/SKILL.md"

architecture_decisions:
  - decision: "Shared framework at skills/build/config-analysis-framework.md"
    rationale: "Single source of truth for analysis dimensions, baseline format, comparison protocol, and suggestion format"
    alternatives: ["Inline in retro-analyst and duplicate in tune", "Place in agents/ or docs/"]
  - decision: "Build skill injects framework into retro dispatch payload"
    rationale: "Reliable injection — skill controls context, survives compression"
    alternatives: ["Agent reads framework directly via Read tool"]
  - decision: "Execution trace piggybacks on brief step 5"
    rationale: "Zero overhead — annotates during existing parallel execution planning"
    alternatives: ["Separate step 3.5", "PostToolUse hooks for observed tracking"]
  - decision: "/robro:tune as new standalone skill"
    rationale: "Clean separation: setup=install infrastructure, tune=audit effectiveness"
    alternatives: ["Extend /robro:setup with --audit mode"]
  - decision: "MCP analysis in tune: detection only, not installation"
    rationale: "Avoid overlap with setup's installation logic"
    alternatives: ["Tune also handles MCP installation"]
  - decision: "Cap config suggestions at 5 per sprint"
    rationale: "Level-up processes each through 5-step flow including web search"
    alternatives: ["No cap — risk slow level-up"]

sections:
  - id: S1
    name: "Shared Analysis Framework"
    description: "The reference document defining analysis dimensions, baseline format, comparison protocol, and suggestion format"
    requirements:
      - "Shared analysis framework consistent between retro-analyst and /robro:tune"
      - "Actionable + evidence-based suggestion format"

  - id: S2
    name: "Build Cycle Enhancement"
    description: "Brief captures baseline, retro-analyst performs structured comparison, dispatch includes framework"
    requirements:
      - "Brief captures structured configuration baseline with coverage mapping"
      - "Brief tags which config items are relevant per task (execution trace)"
      - "Retro-analyst has mandatory Config Effectiveness Analysis section"
      - "Retro suggestions are actionable + evidence-based with full lifecycle operations"
      - "Retro dispatch payload includes baseline and framework"
      - "Retro-phase step 4 extracts Configuration Suggestions for level-up processing"
      - "Level-up Step e supports REMOVE operation alongside CREATE/UPDATE"

  - id: S3
    name: "/robro:tune Skill"
    description: "Standalone configuration audit skill using codebase + git history"
    requirements:
      - "New /robro:tune skill at skills/tune/SKILL.md"
      - "/robro:tune uses AskUserQuestion for confirmation before executing"
      - "/robro:tune uses codebase + git history as data source"
      - "Active-build guard warns if build is in progress"

  - id: S4
    name: "Integration & Documentation"
    description: "Updated docs, keyword detection"
    requirements:
      - "Build SKILL.md reflects config effectiveness"
      - "Keyword detector recognizes tune triggers"
      - "All skills tables include /robro:tune"

