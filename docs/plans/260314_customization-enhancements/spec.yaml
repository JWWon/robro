      2. Assert: zero matches
    passes: true

  - id: C10
    section: S1
    phase: 2
    task: "2.5"
    description: "Full codebase has zero docs/plans/ references in runtime code"
    acceptance_criteria: "grep -rn 'docs/plans' across all runtime files (scripts/, skills/, CLAUDE.md, README.md, .gitignore, hooks/) returns no matches. Only plan artifacts (idea.md, plan.md) may reference it."
    test_type: manual
    test_plan: |
      1. Run: grep -rn 'docs/plans' scripts/ skills/ CLAUDE.md README.md .claude/CLAUDE.md .gitignore hooks/ config.schema.json model-config.yaml
      2. Assert: zero matches
