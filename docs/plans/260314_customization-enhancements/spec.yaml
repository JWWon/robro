    description: "Setup skill .gitignore rules updated to .robro/ patterns + .claude/worktrees/"
    acceptance_criteria: "skills/setup/SKILL.md .gitignore section lists 5 rules: .robro/sessions/*/research/, .robro/sessions/*/discussion/, .robro/sessions/*/status.yaml, .robro/sessions/*/*.bak.*, .claude/worktrees/"
    test_type: manual
    test_plan: |
      1. Run: grep -c '.robro/sessions' skills/setup/SKILL.md
      2. Assert: at least 4
