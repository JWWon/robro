      2. Assert: at least 5
      3. Run: grep -c 'model:' skills/plan/SKILL.md
      4. Assert: at least 5
    passes: true

  - id: C24
    section: S6
    phase: 6
    task: "6.3"
    description: "Plan and spec reviewer prompt files exist"
    acceptance_criteria: "skills/plan/plan-reviewer-prompt.md and skills/plan/spec-reviewer-prompt.md exist with well-structured content"
    test_type: manual
    test_plan: |
      1. Run: ls skills/plan/plan-reviewer-prompt.md skills/plan/spec-reviewer-prompt.md
      2. Assert: both files listed
      3. Run: wc -l skills/plan/plan-reviewer-prompt.md skills/plan/spec-reviewer-prompt.md
      4. Assert: both files have 10+ lines
