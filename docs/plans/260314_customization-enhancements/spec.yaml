    acceptance_criteria: "stop-hook.sh uses robro_config to read sprint_hard_cap with default 30, not a hardcoded value"
    test_type: manual
    test_plan: |
      1. Run: grep 'robro_config.*sprint_hard_cap' scripts/stop-hook.sh
      2. Assert: 1 match
      3. Run: grep -c 'SPRINT_HARD_CAP' scripts/stop-hook.sh
      4. Assert: at least 2 (definition + usage)
    passes: true

  # === S3: Setup Script ===
  - id: C15
    section: S3
    phase: 4
    task: "4.1"
    description: "manage-claudemd.sh exists with new marker format and backward compat"
    acceptance_criteria: "scripts/manage-claudemd.sh exists, is executable, passes bash -n, uses robro@{version}:managed:start format, detects both old and new marker formats, is code-block-aware"
    test_type: manual
    test_plan: |
      1. Run: bash -n scripts/manage-claudemd.sh
      2. Assert: passes
      3. Run: grep 'robro@' scripts/manage-claudemd.sh
      4. Assert: contains robro@${VERSION}:managed:start
      5. Run: grep 'robro:managed:start' scripts/manage-claudemd.sh
      6. Assert: contains backward compat detection for old format
      7. Run: grep 'FENCED\|in_fence\|code.block' scripts/manage-claudemd.sh
      8. Assert: contains code-block-aware logic
    passes: true

  - id: C16
    section: S3
    phase: 7
    task: "7.1"
    description: ".claude/CLAUDE.md managed block uses new marker format"
    acceptance_criteria: ".claude/CLAUDE.md contains <!-- robro@{version}:managed:start --> marker and zero docs/plans/ references"
    test_type: manual
    test_plan: |
      1. Run: grep 'robro@' .claude/CLAUDE.md
      2. Assert: contains <!-- robro@ marker
      3. Run: grep 'docs/plans' .claude/CLAUDE.md
      4. Assert: zero matches
