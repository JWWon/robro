meta:
  id: "260314_customization-enhancements"
  idea: idea.md
  plan: plan.md
  created: "2026-03-14T14:30:00Z"
  updated: "2026-03-14T17:00:00Z"
  ambiguity_score: 0.09
  complexity: "complex"

goal: "Restructure robro's session storage, configuration, and setup workflow to give users project-level control over model tiers, skill thresholds, and agent overrides — while enforcing proper agent usage across the pipeline."

constraints:
  - "Pure markdown/shell plugin — no TypeScript, no compiled artifacts, no databases"
  - "Scripts use ${CLAUDE_PLUGIN_ROOT} for paths, never hardcode absolute paths"
  - "Scripts receive JSON on stdin, use jq to extract fields"
  - "Hook scripts must be executable (chmod +x) and pass bash -n syntax check"
  - "Existing .claude/worktrees/ workflow must be preserved"
  - "model-config.yaml stays as defaults source; config.json provides overrides only"
  - "End marker stays <!-- robro:managed:end --> (no version)"

non_goals:
  - "Migration tooling from docs/plans/ to .robro/sessions/ — clean break"
  - "Reinforcement cap in user-facing config — stays internal as a circuit breaker"
  - "Heavy per-dispatch agent tracking hooks — lightweight enforcement only"
  - "Dual-path detection (checking both old and new paths)"
  - "Config for sessions directory path — hardcoded to .robro/sessions/"

context:
  type: "brownfield"
  tech_stack:
    - "Bash shell scripts"
    - "Markdown skill/agent definitions"
    - "YAML config (model-config.yaml, status.yaml)"
    - "JSON config (.robro/config.json, plugin.json, marketplace.json)"
    - "jq for JSON parsing"
    - "awk for text processing"
  existing_patterns:
    - "PLANS_DIR variable in 5 of 8 scripts (3 scripts use inline hardcoded paths)"
    - "Status.yaml drives hooks — all hooks read status.yaml for state injection"
    - "brief-phase.md gold standard for agent dispatch format with model parameter"
    - "Managed block markers in .claude/CLAUDE.md with version-based change detection"
    - "Plugin version in plugin.json, marketplace version in marketplace.json (currently drifted)"
  key_files:
    - "scripts/lib/load-config.sh (new — shared config loader)"
    - "config.schema.json (new — JSON Schema for .robro/config.json)"
    - "scripts/manage-claudemd.sh (new — CLAUDE.md managed block script)"
    - "scripts/sync-versions.sh (new — version sync script)"
    - ".githooks/pre-push (new — git hook for version sync)"
    - "model-config.yaml (existing — add 4 missing agents)"
    - "skills/idea/SKILL.md (existing — path migration + agent dispatch format)"
    - "skills/plan/SKILL.md (existing — path migration + agent dispatch format)"
    - "skills/setup/SKILL.md (existing — invoke manage-claudemd.sh + .gitignore + config.json)"

architecture_decisions:
  - decision: "Version sync via raw git hook (.githooks/pre-push)"
    rationale: "Robro has no package.json/lefthook. Zero deps. Setup via git config core.hooksPath."
    alternatives: ["lefthook (requires package.json)", "GitHub Action (only catches in CI)", "manual process"]
  - decision: "Keep model-config.yaml as defaults source; config.json provides overrides only"
    rationale: "Users who never customize get zero behavior change. Clear separation of plugin internals vs user config."
    alternatives: ["Delete YAML and embed defaults in JSON Schema", "Single merged config file"]
  - decision: "End marker stays <!-- robro:managed:end --> (no version)"
    rationale: "Single version source in start marker. Avoids drift between start/end marker versions."
    alternatives: ["Version in both markers"]
  - decision: "Shared config loader script (scripts/lib/load-config.sh)"
    rationale: "All hook scripts source it for SESSIONS_DIR and config values. Avoids duplicating load logic."
    alternatives: ["Inline loading in each script", "Environment variables"]
  - decision: "Plan skill uses standard tier for its own agent dispatches"
    rationale: "Plan skill generates spec.yaml complexity but doesn't consume it. Standard is balanced and predictable."
    alternatives: ["Always complex (wasteful)", "Always light (too cheap for Architect/Critic)"]

sections:
  - id: S1
    name: "Path Migration"
    description: "Replace all docs/plans/ references with .robro/sessions/ across scripts, skills, config, and documentation"
    requirements:
      - "Move session artifacts from docs/plans/ to .robro/sessions/ across all files"
      - "Clean break — no migration, no dual-path detection"
      - "Shell scripts use shared SESSIONS_DIR variable from load-config.sh"

  - id: S2
    name: "Config System"
    description: "Project-level .robro/config.json with JSON Schema, model tier overrides, threshold customization"
    requirements:
      - "JSON Schema (config.schema.json) at plugin root with all fields documented"
      - "Config is optional — plugin falls back to model-config.yaml defaults when absent"
      - "Precedence: agent_overrides > config.json tier > model-config.yaml tier"
      - "model-config.yaml updated with all 11 agents"

  - id: S3
    name: "Setup Script"
    description: "manage-claudemd.sh for .claude/CLAUDE.md management with new marker format"
    requirements:
      - "Dedicated shell script handles all CLAUDE.md management cases"
      - "New marker format: <!-- robro@{version}:managed:start -->"
      - "Backward compat: detects both old and new marker formats"
      - "Code-block-aware marker detection"

  - id: S4
    name: "Setup Skill Updates"
    description: "Setup skill invokes manage-claudemd.sh, configures .gitignore for .robro/, offers config.json"
    requirements:
      - ".gitignore rules for .robro/sessions/ patterns and .claude/worktrees/"
      - "Setup skill invokes manage-claudemd.sh instead of inline logic"
      - "Setup skill offers to create .robro/config.json with schema reference"

  - id: S5
    name: "Version Sync"
    description: "Automated sync from plugin.json to marketplace.json via git hook"
    requirements:
      - "sync-versions.sh reads plugin.json and updates marketplace.json"
      - ".githooks/pre-push triggers sync on every push"
      - "Version management rules documented in CLAUDE.md"

  - id: S6
    name: "Agent Audit"
    description: "All agents have model-config entries, skill instructions explicitly name agent dispatches"
    requirements:
      - "4 missing agents added to model-config.yaml (planner, contrarian, simplifier, ontologist)"
      - "Idea skill has explicit Agent() dispatch format with model parameter"
      - "Plan skill has explicit Agent() dispatch format for all agent dispatch steps"

checklist:
  # === S1: Path Migration ===
  - id: C1
    section: S1
    phase: 1
    task: "1.1"
    description: "Shared config loader (scripts/lib/load-config.sh) exists and exports SESSIONS_DIR"
    acceptance_criteria: "load-config.sh exists, is executable, passes bash -n, exports SESSIONS_DIR='.robro/sessions' and robro_config function"
    test_type: manual
    test_plan: |
      1. Run: bash -n scripts/lib/load-config.sh
      2. Run: source scripts/lib/load-config.sh && echo $SESSIONS_DIR
      3. Assert: output is ".robro/sessions"
    passes: true

  - id: C2
    section: S1
    phase: 1
    task: "1.2"
    description: "3 scripts without PLANS_DIR variable refactored to use SESSIONS_DIR"
    acceptance_criteria: "spec-gate.sh, drift-monitor.sh, keyword-detector.sh source load-config.sh and use $SESSIONS_DIR with zero inline docs/plans references"
    test_type: manual
    test_plan: |
      1. Run: grep -c 'docs/plans' scripts/spec-gate.sh scripts/drift-monitor.sh scripts/keyword-detector.sh
      2. Assert: zero matches in all 3 files
      3. Run: bash -n on all 3 scripts
      4. Assert: all pass
    passes: true

  - id: C3
    section: S1
    phase: 1
    task: "1.3"
    description: "5 scripts with PLANS_DIR migrated to load-config.sh"
    acceptance_criteria: "session-start.sh, pipeline-guard.sh, error-tracker.sh, pre-compact.sh, stop-hook.sh source load-config.sh and use $SESSIONS_DIR"
    test_type: manual
    test_plan: |
      1. Run: grep -rn 'docs/plans' scripts/session-start.sh scripts/pipeline-guard.sh scripts/error-tracker.sh scripts/pre-compact.sh scripts/stop-hook.sh
      2. Assert: zero matches
      3. Run: bash -n on all 5 scripts
      4. Assert: all pass
    passes: true

  - id: C4
    section: S1
    phase: 1
    task: "1.4"
    description: ".gitignore updated from docs/plans/ to .robro/sessions/ patterns"
    acceptance_criteria: ".gitignore has .robro/sessions/*/research/, .robro/sessions/*/discussion/, .robro/sessions/*/status.yaml, .robro/sessions/*/*.bak.*, .claude/worktrees/ — zero docs/plans/ rules"
    test_type: manual
    test_plan: |
      1. Run: grep '.robro/sessions' .gitignore
      2. Assert: 4 matching lines
      3. Run: grep '.claude/worktrees' .gitignore
      4. Assert: 1 matching line
      5. Run: grep 'docs/plans' .gitignore
      6. Assert: zero matches
    passes: true

  - id: C5
    section: S1
    phase: 1
    task: "1.5"
    description: "Zero docs/plans references in all shell scripts"
    acceptance_criteria: "grep -rn 'docs/plans' scripts/ returns no matches"
    test_type: manual
    test_plan: |
      1. Run: grep -rn 'docs/plans' scripts/
      2. Assert: exit code 1 (no matches)
    passes: true

  - id: C6
    section: S1
    phase: 2
    task: "2.1"
    description: "Idea skill path references updated to .robro/sessions/"
    acceptance_criteria: "skills/idea/SKILL.md has zero docs/plans/ references"
    test_type: manual
    test_plan: |
      1. Run: grep -n 'docs/plans' skills/idea/SKILL.md
      2. Assert: zero matches
    passes: true

  - id: C7
    section: S1
    phase: 2
    task: "2.2"
    description: "Plan skill path references updated to .robro/sessions/"
    acceptance_criteria: "skills/plan/SKILL.md has zero docs/plans/ references"
    test_type: manual
    test_plan: |
      1. Run: grep -n 'docs/plans' skills/plan/SKILL.md
      2. Assert: zero matches
    passes: true

  - id: C8
    section: S1
    phase: 2
    task: "2.3"
    description: "Do and tune skill path references updated"
    acceptance_criteria: "skills/do/SKILL.md and skills/tune/SKILL.md have zero docs/plans/ references"
    test_type: manual
    test_plan: |
      1. Run: grep -n 'docs/plans' skills/do/SKILL.md skills/tune/SKILL.md
