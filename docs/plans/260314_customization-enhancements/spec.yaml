  # === S2: Config System ===
  - id: C11
    section: S2
    phase: 3
    task: "3.1"
    description: "JSON Schema (config.schema.json) exists with all fields documented"
    acceptance_criteria: "config.schema.json exists at plugin root, is valid JSON, defines model_tiers, thresholds, agent_overrides with $defs for model/model_capped types"
    test_type: manual
    test_plan: |
      1. Run: jq . config.schema.json > /dev/null && echo OK
      2. Assert: OK
      3. Run: jq '.properties | keys' config.schema.json
      4. Assert: contains "$schema", "model_tiers", "thresholds", "agent_overrides"
    passes: true

  - id: C12
    section: S2
    phase: 3
    task: "3.2"
    description: "model-config.yaml has all 11 agents in each tier"
    acceptance_criteria: "Each tier (light, standard, complex) has entries for all 11 agents: builder, reviewer, architect, critic, researcher, retro-analyst, conflict-resolver, planner, contrarian, simplifier, ontologist"
    test_type: manual
    test_plan: |
      1. Run: python3 -c "import yaml; d=yaml.safe_load(open('model-config.yaml')); print(len([k for k in d['tiers']['standard'] if k != 'default']))"
      2. Assert: 11
      3. Run: python3 -c "import yaml; d=yaml.safe_load(open('model-config.yaml')); agents=set(); [agents.update(d['tiers'][t].keys()) for t in d['tiers']]; agents.discard('default'); print(sorted(agents))"
      4. Assert: all 11 agents listed
    passes: true

  - id: C13
    section: S2
    phase: 3
    task: "3.3"
    description: "Brief phase loads config.json overrides on top of model-config.yaml"
    acceptance_criteria: "skills/do/brief-phase.md contains instructions to read .robro/config.json, check model_tiers and agent_overrides, with precedence: agent_overrides > config.json tier > model-config.yaml tier"
    test_type: manual
    test_plan: |
      1. Run: grep -c 'config.json' skills/do/brief-phase.md
      2. Assert: at least 1 match
      3. Run: grep 'precedence\|Precedence\|agent_overrides' skills/do/brief-phase.md
      4. Assert: at least 1 match
