    acceptance_criteria: "skills/setup/SKILL.md Step 1 calls manage-claudemd.sh via Bash, and includes a Step 3.7 for config.json creation offer"
    test_type: manual
    test_plan: |
      1. Run: grep 'manage-claudemd.sh' skills/setup/SKILL.md
      2. Assert: at least 1 match
      3. Run: grep 'config.json' skills/setup/SKILL.md
      4. Assert: at least 2 matches (creation step + reference)
    passes: true

  # === S5: Version Sync ===
  - id: C19
    section: S5
    phase: 5
    task: "5.1"
    description: "sync-versions.sh exists and syncs marketplace.json to plugin.json version"
    acceptance_criteria: "scripts/sync-versions.sh exists, is executable, passes bash -n, reads plugin.json version and updates marketplace.json"
    test_type: manual
    test_plan: |
      1. Run: bash -n scripts/sync-versions.sh
      2. Assert: passes
      3. Run: diff <(jq -r '.version' .claude-plugin/plugin.json) <(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
      4. Assert: no diff (versions match after sync)
    passes: true

  - id: C20
    section: S5
    phase: 5
    task: "5.2"
    description: ".githooks/pre-push exists and triggers sync-versions.sh"
    acceptance_criteria: ".githooks/pre-push exists, is executable, passes bash -n, calls sync-versions.sh"
    test_type: manual
    test_plan: |
      1. Run: bash -n .githooks/pre-push
      2. Assert: passes
      3. Run: grep 'sync-versions.sh' .githooks/pre-push
      4. Assert: 1 match
