    acceptance_criteria: "skills/idea/SKILL.md contains Agent() dispatch examples for Steps 2 (Researcher), 5 (challenge escalation), and 7 (web research) with model parameter"
    test_type: manual
    test_plan: |
      1. Run: grep -c 'subagent_type.*robro:' skills/idea/SKILL.md
      2. Assert: at least 3
      3. Run: grep -c 'model:' skills/idea/SKILL.md
      4. Assert: at least 3
