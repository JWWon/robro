    acceptance_criteria: "skills/plan/SKILL.md contains Agent() dispatch examples for Steps 2 (Researcher, Architect, Critic), 4 (Planner), 5 (plan reviewer), 7 (spec reviewer), 9 (final review) with model parameter"
    test_type: manual
    test_plan: |
