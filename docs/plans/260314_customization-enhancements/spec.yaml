  # === Integration ===
  - id: C25
    section: S1
    phase: 7
    task: "7.3"
    description: "End-to-end validation — all 7 success criteria pass"
    acceptance_criteria: "All success criteria from idea.md verified: (1) zero docs/plans refs, (2) config.json works with defaults, (3) manage-claudemd.sh uses new format, (4) .gitignore correct, (5) version sync works, (6) all 11 agents in model-config, (7) JSON Schema valid"
    test_type: manual
    test_plan: |
      1. C1: grep -rn 'docs/plans' across runtime files returns zero
      2. C2: source load-config.sh && robro_config '.thresholds.sprint_hard_cap' '30' returns 30
      3. C3: grep 'robro@' scripts/manage-claudemd.sh shows new format
      4. C4: grep '.robro/' .gitignore returns 4 lines
      5. C5: plugin.json and marketplace.json versions match
      6. C6: model-config.yaml has 11 agents per tier
      7. C7: jq . config.schema.json succeeds
    passes: true
