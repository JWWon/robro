# Model configuration per complexity tier
# Read by /robro:do at Brief phase to determine agent dispatch models
# Tiers: light (fast/cheap), standard (balanced), complex (thorough)
#
# Agent tool model values: haiku, sonnet, opus
# Researcher, retro-analyst, and conflict-resolver are capped at sonnet (never opus)
# -- they gather/summarize/merge, they don't make architectural decisions

tiers:
  light:
    default: haiku
    builder: haiku
    reviewer: sonnet
    architect: sonnet
    critic: sonnet
    researcher: haiku
    retro-analyst: haiku
    conflict-resolver: haiku
    planner: haiku
    contrarian: haiku
    simplifier: haiku
    ontologist: haiku
  standard:
    default: sonnet
    builder: sonnet
    reviewer: sonnet
    architect: opus
    critic: opus
    researcher: sonnet
    retro-analyst: sonnet
    conflict-resolver: sonnet
    planner: sonnet
    contrarian: sonnet
    simplifier: sonnet
    ontologist: sonnet
  complex:
    default: opus
    builder: opus
    reviewer: opus
    architect: opus
    critic: opus
    researcher: sonnet
    retro-analyst: sonnet
    conflict-resolver: sonnet
    planner: opus
    contrarian: opus
    simplifier: opus
    ontologist: opus
