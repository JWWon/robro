      2. Verify both "Greenfield" (40/30/30) and "Brownfield" (35/25/25/15) formulas appear
    passes: true

  - id: C25
    section: S5
    phase: 5
    task: "5.4"
    description: "Setup v0.2.0 — setup skill handles migration with new directories and gitignore rules"
    acceptance_criteria: "skills/setup/SKILL.md and claude-md-template.md reference .robro/skills/ directory creation, new .gitignore rules for state files, and descriptions of Wonder agent, learned skills, oscillation detection."
    test_type: "manual"
    test_plan: |
      1. Read skills/setup/claude-md-template.md
      2. Verify it mentions: Wonder agent, learned skills, oscillation detection, skill injection
      3. Verify .gitignore rules include .skill-index.json, .oscillation-state.json, .injected-skills.json
    passes: true

  - id: C26
    section: S5
    phase: 5
    task: "5.5"
    description: "Version bump — plugin.json version is 0.2.0"
    acceptance_criteria: "jq -r '.version' .claude-plugin/plugin.json outputs '0.2.0'. sync-versions.sh copies it to marketplace.json."
    test_type: "unit"
    test_plan: |
      1. Run: jq -r '.version' .claude-plugin/plugin.json — should output "0.2.0"
      2. Run: bash scripts/sync-versions.sh
      3. Run: jq -r '.version' .claude-plugin/marketplace.json — should output "0.2.0"
    passes: true
