    section: S3
    phase: 3
    task: "3.2"
    description: "Level-up skill writing — level-up phase instructions include Learned Skill type"
    acceptance_criteria: "skills/do/level-up-phase.md contains a 'Learned Skill' section with instructions to write .robro/skills/*.md with JSON frontmatter, and rebuild the skill index."
    test_type: "manual"
    test_plan: |
      1. Read skills/do/level-up-phase.md
      2. Verify section titled "Type: Learned Skill" exists
      3. Verify instructions reference JSON frontmatter with name, triggers, description, created_by fields
      4. Verify instructions include skill index rebuild step
    passes: true

  - id: C16
    section: S3
    phase: 3
    task: "3.3"
    description: "User-scoped skills — ~/.robro/skills/ scanned and included in index"
    acceptance_criteria: "Skill index builder scans both .robro/skills/ and ~/.robro/skills/. User-scoped entries have scope 'user'. Project-scoped skills take priority in injection."
    test_type: "integration"
    test_plan: |
      1. Create a skill in a temp dir simulating ~/.robro/skills/
      2. Run index builder with the user path overridden
      3. Verify index contains the entry with scope: "user"
    passes: true

  - id: C17
    section: S4
    phase: 4
    task: "4.1"
    description: "Rationalization tables — present in brief phase with >= 6 rows"
    acceptance_criteria: "skills/do/brief-phase.md contains a 'Rationalization Tables' section with a table of >= 6 rationalization/rebuttal pairs."
    test_type: "manual"
    test_plan: |
      1. Read skills/do/brief-phase.md
      2. Verify section titled "Rationalization Tables" exists
      3. Count table rows (excluding header) — should be >= 6
    passes: true

  - id: C18
    section: S4
    phase: 4
    task: "4.2"
    description: "Verification-before-completion gate — mandatory verification in builder agent"
    acceptance_criteria: "agents/builder.md contains a 'Verification Gate (MANDATORY)' section requiring verification command execution before claiming DONE."
    test_type: "manual"
    test_plan: |
      1. Read agents/builder.md
      2. Verify section titled "Verification Gate (MANDATORY)" exists
      3. Verify it states DONE requires verification evidence
      4. Verify it appears before the Status Protocol section
    passes: true

  - id: C19
    section: S4
    phase: 4
    task: "4.3"
    description: "Prompt sanitization — keyword-detector strips XML, URLs, code blocks before matching"
    acceptance_criteria: "scripts/keyword-detector.sh contains a sanitize_prompt function that strips XML tags, URLs, file paths, and code blocks. The function is called before keyword matching."
    test_type: "unit"
    test_plan: |
      1. grep -c 'sanitize_prompt' scripts/keyword-detector.sh — should be >= 2 (definition + usage)
      2. Test: echo '<tag>idea</tag> https://example.com /path/file.ts' through sanitize_prompt — should output lowercase text without tags/URLs/paths
    passes: true

  - id: C20
    section: S4
    phase: 4
    task: "4.4"
    description: "Context budget priority — rules present in builder, reviewer, architect agents"
    acceptance_criteria: "agents/builder.md, agents/reviewer.md, and agents/architect.md each contain a 'Context Budget Priority' section with a numbered priority list."
    test_type: "manual"
    test_plan: |
      1. grep -c 'Context Budget Priority' agents/builder.md agents/reviewer.md agents/architect.md
      2. All three should return 1
    passes: true

  - id: C21
    section: S4
    phase: 4
    task: "4.5"
    description: "SubagentStop verification — hook checks for status protocol compliance"
    acceptance_criteria: "scripts/verify-deliverables.sh exists and is executable. hooks/hooks.json has a SubagentStop entry. Hook emits advisory when subagent output lacks standard Status line."
    test_type: "integration"
    test_plan: |
      1. echo '{"tool_result":"task complete"}' | bash scripts/verify-deliverables.sh — should emit advisory
      2. echo '{"tool_result":"**Status**: DONE"}' | bash scripts/verify-deliverables.sh — should produce no output
      3. jq '.SubagentStop' hooks/hooks.json — should show the hook entry
    passes: true

  - id: C22
    section: S5
    phase: 5
    task: "5.1"
    description: "Version update check — SessionStart emits notice when local < remote"
    acceptance_criteria: "scripts/update-check.mjs exists. hooks/hooks.json has a second SessionStart entry for it. Script creates ~/.robro/.update-cache.json with 24h TTL. Network failure causes silent exit (no error output)."
    test_type: "integration"
